<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendario de Actividades</title>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css" />
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.dataTables.min.css"/>
  <link rel="stylesheet" href="https://cdn.datatables.net/fixedheader/3.3.2/css/fixedHeader.dataTables.min.css"/>
  <link rel="stylesheet" href="estilos.css" />
  <link rel="icon" type="image/png" href="Logo Raitrai.png" />
</head>
<style>
 /* Encabezado fijo de DataTables con scroll horizontal */
.dataTables_scrollHead {
  position: sticky !important;
  top: 70px;
  z-index: 50;
  background: #fff;
}

/* Evita descuadres visuales del encabezado */
.dataTables_scrollHead table,
.dataTables_scrollBody table {
  margin: 0 !important;
}

#tablaCalendario thead th {
  white-space: nowrap;
}
  
.load-box {
  margin: 12px 0 18px;
  padding: 12px 14px;
  border: 1px solid #d7dbe3;
  border-radius: 8px;
  background: #f8fafc;
  max-width: 720px;
}

#loadTitle {
  font-weight: 700;
  margin-bottom: 4px;
}

#loadDetail {
  font-size: 13px;
  color: #555;
  margin-bottom: 8px;
}

.load-track {
  width: 100%;
  height: 10px;
  background: #e5e7eb;
  border-radius: 999px;
  overflow: hidden;
}

.load-progress {
  width: 0%;
  height: 100%;
  background: #005baa;
  transition: width .25s ease;
}

.load-box.ok .load-progress {
  background: #16a34a;
}

.load-box.error .load-progress {
  background: #dc2626;
}
  /* Header fijo vertical */
.dataTables_scrollHead {
  position: sticky !important;
  top: 70px;
  z-index: 60;
  background: white;
}

/* Columnas fijas horizontales: N° Negocio, Grupo, Pax */
#tablaCalendario th:nth-child(1),
#tablaCalendario td:nth-child(1) {
  position: sticky;
  left: 0;
  z-index: 40;
  background: white;
  min-width: 95px;
}

#tablaCalendario th:nth-child(2),
#tablaCalendario td:nth-child(2) {
  position: sticky;
  left: 95px;
  z-index: 40;
  background: white;
  min-width: 210px;
}

#tablaCalendario th:nth-child(3),
#tablaCalendario td:nth-child(3) {
  position: sticky;
  left: 305px;
  z-index: 40;
  background: white;
  min-width: 120px;
}

/* Encabezados fijos por encima de celdas */
#tablaCalendario th:nth-child(1),
#tablaCalendario th:nth-child(2),
#tablaCalendario th:nth-child(3) {
  z-index: 70;
}

/* Evita descuadres */
#tablaCalendario th,
#tablaCalendario td {
  box-sizing: border-box;
  vertical-align: top;
}
</style>
<body>

  <!-- 🔺 Encabezado común -->
  <div id="encabezado"></div>

  <main>
    <h1>CALENDARIO DE ACTIVIDADES</h1>

    <!-- Barra de carga -->
    <div id="loadBox" class="load-box" style="display:none;">
      <div id="loadTitle">Cargando...</div>
      <div id="loadDetail">Preparando datos</div>
      <div class="load-track">
        <div id="loadProgress" class="load-progress"></div>
      </div>
    </div>

    <div id="toolbar" class="toolbar">
      <div class="row">
        <div class="column long">
          <input type="text" id="buscador" placeholder="🔍 Buscar..." />
        </div>
        <div class="column medium">
          <select id="filtroDestino"></select>
        </div>
        <div class="column medium">
           <select id="filtroAno"></select>
        </div>
        <div class="column medium">
          <input type="date" id="filtroFechaDesde" title="Mostrar actividades desde esta fecha" />
        </div>

        <button id="btn-view-history">📜 Ver Historial</button>
        <button id="btn-export-excel">📤 Exportar Excel</button>
      </div>
    </div>  

    <table id="tablaCalendario" class="display nowrap" style="width:100%">
      <thead><tr id="encabezadoCalendario"></tr></thead>
      <tbody id="cuerpoCalendario"></tbody>
    </table>
  </main>

  <!-- Modal de historial -->
  <div id="modalHistorial" class="modal" style="display:none;">
    <h2>Historial de cambios</h2>
    <input type="text" id="buscadorHistorial" placeholder="🔍 Buscar en historial..." />
    <input type="date" id="histInicio" />
    <input type="date" id="histFin" />
    <button id="btn-refresh-history">🔁 Actualizar</button>
    <button id="btn-close-history">❌ Cerrar</button>
    <table id="tablaHistorial" class="display" style="width:100%">
      <thead>
        <tr><th>Fecha</th><th>Usuario</th><th>N° Negocio</th><th>Campo</th><th>Antes</th><th>Ahora</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>


  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.colVis.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.datatables.net/fixedheader/3.3.2/js/dataTables.fixedHeader.min.js"></script>

  <script>
    fetch('encabezado.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('encabezado').innerHTML = html;
      })
      .then(() => {
        // Aquí creamos un único <script type="module"> que arrancará
        // TODO tu flujo: importa firebase-init.js y luego calendario.js
        const s = document.createElement('script');
        s.type = 'module';
        s.textContent = `
          import './firebase-init.js';
          import './script.js'; 
          import './calendario.js';
        `;
        document.body.appendChild(s);
      });
  </script>
</body>
</html>
